name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://zcjkbrfiqelulixqjsjx.supabase.co/rest/v1/products?select=id&limit=1"
